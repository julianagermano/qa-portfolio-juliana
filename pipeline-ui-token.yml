# Projeto 6 — UI + API Token (Playwright)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - ui-api-token/**
      - pipeline-ui-token.yml

pool:
  vmImage: 'windows-latest'

variables:
  projectDir: 'ui-api-token'
  reportDir: '$(Build.SourcesDirectory)/ui-api-token/playwright-report'
  resultsDir: '$(Build.SourcesDirectory)/ui-api-token/test-results'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Instalar Node.js 20'

  - script: |
      cd $(Build.SourcesDirectory)/$(projectDir)
      echo "Instalar dependências (npm)…"
      npm install
      echo "Instalar navegadores Playwright…"
      npx playwright install --with-deps
    displayName: 'Instalar dependências (npm + Playwright)'

  - script: |
      cd $(Build.SourcesDirectory)/$(projectDir)
      echo "Executar testes (HTML + JUnit)…"
      npx playwright test --reporter=list,html,junit --output=test-results --reporter-option outputFile=test-results/junit.xml
    displayName: 'Executar testes UI + API Token'

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(resultsDir)/junit.xml'
      failTaskOnFailedTests: true
    condition: succeededOrFailed()
    displayName: 'Publicar Test Results (JUnit)'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(reportDir)'
      ArtifactName: 'playwright-report-ui-token'
      publishLocation: 'Container'
    condition: always()
    displayName: 'Publicar relatório HTML (Playwright)'