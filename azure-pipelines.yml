# Projeto 3 — API (Newman) – CI

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pipeline-api/**
      - api-auth-automation/**

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Instalar Node.js 20'

- powershell: |
    npm install -g newman newman-reporter-htmlextra --legacy-peer-deps --force
    newman -v
  displayName: 'Instalar Newman + htmlextra'

# =========================
# CONTRACT GATE - API (login + me)
# =========================
- powershell: |
    cd "$(Build.SourcesDirectory)/api-auth-automation"

    # Garantir que as ferramentas existem
    npm install -g newman newman-reporter-htmlextra --force
    newman -v

    # Sincroniza schemas do Git -> environment
    node tools/sync-schemas-to-env.js

    # Garante pasta de saída SEMPRE
    New-Item -ItemType Directory -Force "reports" | Out-Null
    $ts = Get-Date -Format "yyyy-MM-dd_HHmmss"

    # Executa a collection REAL do projeto (não contract.json)
    
    newman run "Auth.postman_collection.json" `
      -e "Auth_DummyJSON.postman_environment.json" `
      -r "cli,htmlextra,junit" `
      --reporter-htmlextra-export "reports/Resultado_API_Contrato_$ts.html" `
      --reporter-junit-export "reports/junit.xml

    Write-Host "=== Arquivos gerados em reports ==="
    dir .\reports
  displayName: "Executar Newman (Contrato)"

- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/api-auth-automation/reports'
    artifact: 'contract-report'
    publishLocation: 'pipeline'
  displayName: "Publicar relatório de contrato (HTML)"
  
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/api-auth-automation/reports'
    failTaskOnFailedTests: false
  displayName: 'Publicar JUnit (Newman)'

