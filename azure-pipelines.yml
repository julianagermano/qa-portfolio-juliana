# Projeto 3 — API (Newman) – CI

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pipeline-api/**
      - api-auth-automation/**

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Instalar Node.js 20'

# (Item 1) Instalar Newman + reporters necessários (htmlextra + junitfull)
- powershell: |
    npm install -g newman newman-reporter-htmlextra newman-reporter-junitfull --force
    newman -v
  displayName: 'Instalar Newman + reporters (htmlextra/junit)'

# =========================
# (Item 2) Executar Newman (Contrato) — AQUI ✅
# =========================
- powershell: |
    $base    = Join-Path "$(Build.SourcesDirectory)" "api-auth-automation"
    $reports = Join-Path $base "reports"

    # Garantir pasta de reports sempre
    New-Item -ItemType Directory -Force -Path $reports | Out-Null

    # Sincroniza schemas do Git -> environment
    node (Join-Path $base "tools\\sync-schemas-to-env.js")

    $ts    = Get-Date -Format "yyyy-MM-dd_HHmmss"
    $html  = Join-Path $reports ("Resultado_API_Contrato_{0}.html" -f $ts)
    $junit = Join-Path $reports "junit.xml"

    $collection = Join-Path $base "Auth.postman_collection.json"
    $envFile    = Join-Path $base "Auth_DummyJSON.postman_environment.json"

    # Rodar Newman com HTML + JUnit
    newman run $collection `
      -e $envFile `
      -r "cli,htmlextra,junitfull" `
      --reporter-htmlextra-export $html `
      --reporter-junitfull-export $junit

    Write-Host "=== Arquivos gerados em reports ==="
    Get-ChildItem -Path $reports -Force | Format-Table Name, Length

    # Falhar se não gerou nada (evita artifact vazio)
    if (-not (Get-ChildItem -Path $reports -File -ErrorAction SilentlyContinue)) {
      Write-Error "Nenhum arquivo foi gerado em reports/. Verifique comando do Newman/reporters."
      exit 1
    }
  displayName: 'Executar Newman (Contrato)'

# =========================
# Publicar Artifact (pasta reports)
# =========================
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/api-auth-automation/reports'
    artifact: 'contract-report'
    publishLocation: 'pipeline'
  displayName: 'Publicar relatório de contrato (HTML)'

# =========================
# Publicar JUnit (aparece em Tests no ADO)
# =========================
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/api-auth-automation/reports'
    failTaskOnFailedTests: false
  displayName: 'Publicar JUnit (Newman)'

