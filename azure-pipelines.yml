# Projeto 3 — API (Newman) – CI

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pipeline-api/**
      - api-auth-automation/**

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Instalar Node.js 20'

- powershell: |
    npm install -g newman newman-reporter-htmlextra --legacy-peer-deps --force
    newman -v
  displayName: 'Instalar Newman + htmlextra'

# =========================
# CONTRACT GATE - API (login + me)
# =========================
- powershell: |
    cd "$(Build.SourcesDirectory)/api-auth-automation"

    # Confirma que os arquivos existem (diagnóstico rápido)
    dir

    # Sincroniza schemas do Git -> environment
    node tools/sync-schemas-to-env.js

    # Garante pasta de reports
    New-Item -ItemType Directory -Force "reports" | Out-Null
    $ts = Get-Date -Format "yyyy-MM-dd_HHmmss"

    # Roda a collection REAL do projeto
    newman run "Auth.postman_collection.json" `
      -e "Auth_DummyJSON.postman_environment.json" `
      -r "cli,htmlextra" `
      --reporter-htmlextra-export "reports/Resultado_API_Contrato_$ts.html"

    Write-Host "=== Arquivos gerados em reports ==="
    dir .\reports
   
- task: PowerShell@2
  displayName: 'Executar Newman (Contrato)'
  inputs:
    targetType: 'inline'
    script: |
      $base = "$(Build.SourcesDirectory)/api-auth-automation"
      New-Item -ItemType Directory -Force -Path "$base/reports" | Out-Null
      newman run "$base/collections/contract.json" -r html --reporter-html-export "$base/reports/contract.html"
