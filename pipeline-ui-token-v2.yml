trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  projectdir: 'ui-api-token'
  NODE_VERSION: '20.x'
  NPM_CACHE_FOLDER: '$(Pipeline.Workspace)/.npm'
  PLAYWRIGHT_BROWSERS_PATH: '$(Pipeline.Workspace)/.pw-browsers'

steps:
- checkout: self
  fetchDepth: 1

# Node
- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Usar Node.js $(NODE_VERSION)'

# Diagnóstico: garante pasta do projeto
- powershell: |
    Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    Write-Host "Conteúdo da raiz do repo:"
    Get-ChildItem "$(Build.SourcesDirectory)" -Force

    $proj = "$(Build.SourcesDirectory)/$(projectdir)"
    Write-Host "Projeto esperado em: $proj"

    if (!(Test-Path $proj)) {
      Write-Error "❌ Pasta do projeto não encontrada: $proj"
      exit 1
    }

    Set-Location $proj
    Write-Host "✅ Pasta atual:"
    pwd
    Get-ChildItem -Force
  displayName: 'PASSO B - Entrar na pasta do projeto'

# Cache npm
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(NPM_CACHE_FOLDER)'
  displayName: 'Cache do npm'

# Instalar dependências
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    npm config set cache "$(NPM_CACHE_FOLDER)" --global
    npm ci
  displayName: 'PASSO C - Instalar dependências (npm ci)'

# Cache Playwright browsers
- task: Cache@2
  inputs:
    key: 'playwright | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      playwright | "$(Agent.OS)"
    path: '$(PLAYWRIGHT_BROWSERS_PATH)'
  displayName: 'Cache Playwright browsers'

# Health Check (para falhar com clareza se BASE_URL estiver fora)
- powershell: |
    Write-Host "BASE_URL=$env:BASE_URL"

    $uri = [Uri]$env:BASE_URL
    $hostName = $uri.Host   # ✅ aqui a correção: NÃO use $Host
    Write-Host "Host detectado: $hostName"

    Write-Host "== DNS =="
    try {
      $ips = [System.Net.Dns]::GetHostAddresses($hostName)
      $ips | ForEach-Object { Write-Host "IP: $_" }
      Write-Host "✅ DNS OK"
    } catch {
      Write-Error "❌ DNS falhou (No such host is known / ERR_NAME_NOT_RESOLVED): $hostName"
      exit 1
    }

    Write-Host "== Rede (443) =="
    $tnc = Test-NetConnection $hostName -Port 443
    if (-not $tnc.TcpTestSucceeded) {
      Write-Error "❌ Porta 443 não acessível (rede/firewall/ambiente fora)"
      exit 1
    }
    Write-Host "✅ Porta 443 OK"

    Write-Host "== HTTP =="
    try {
      $resp = Invoke-WebRequest -Uri $env:BASE_URL -UseBasicParsing -TimeoutSec 20
      Write-Host "✅ HTTP OK: Status $($resp.StatusCode)"
    } catch {
      Write-Error "❌ HTTP falhou: $($_.Exception.Message)"
      exit 1
    }
  displayName: "Health Check - verificar acesso ao ambiente"
  env:
    BASE_URL: $(BASE_URL)

# Garantir pastas de evidências (evita "Path does not exist")
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    New-Item -ItemType Directory -Force "test-results" | Out-Null
    New-Item -ItemType Directory -Force "playwright-report" | Out-Null
  displayName: 'Criar pastas de evidência'

# Instalar browsers Playwright
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    $env:PLAYWRIGHT_BROWSERS_PATH = "$(PLAYWRIGHT_BROWSERS_PATH)"
    npx playwright install
  displayName: 'Instalar browsers do Playwright'
  env:
    PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

# Executar testes
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"

    # Não printar token! Só validar que existe:
    if (-not $env:API_TOKEN) { throw "API_TOKEN não foi injetado no ambiente." }

    $env:PLAYWRIGHT_BROWSERS_PATH = "$(PLAYWRIGHT_BROWSERS_PATH)"
    npx playwright test --reporter=list,html,junit
  displayName: 'PASSO D - Executar testes Playwright'
  continueOnError: true
  env:
    BASE_URL: $(BASE_URL)
    API_TOKEN: $(API_TOKEN)
    PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

# Publicar JUnit (se existir)
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/$(projectdir)'
    failTaskOnFailedTests: false
  displayName: 'Publicar JUnit'

# Publicar evidências (test-results)
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/test-results'
    artifact: 'test-results'
  displayName: 'Publicar test-results'

# Publicar relatório HTML (playwright-report)
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/playwright-report'
    artifact: 'playwright-report'
  displayName: 'Publicar playwright-report'