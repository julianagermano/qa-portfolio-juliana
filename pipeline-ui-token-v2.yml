# Projeto 6 - UI + API Token (Playwright) - v2 limpa

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - ui-api-token/**
      - pipeline-ui-token-v2.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  projectDir: 'ui-api-token'
  reportDir: '$(Build.SourcesDirectory)/ui-api-token/playwright-report'
  resultsDir: '$(Build.SourcesDirectory)/ui-api-token/test-results'
  PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Instalar Node.js 20'

  - script: |
      set -e
      cd "$(Build.SourcesDirectory)/$(projectDir)"
      echo "npm ci || npm install"
      npm ci || npm install
      echo "Baixar Chromium no workspace (com deps)..."
      npx playwright install --with-deps chromium
      echo "Conteudo de .pw-browsers apos o download:"
      ls -la "$(Build.SourcesDirectory)/.pw-browsers" || true
    displayName: 'Instalar dependencias + Chromium (Playwright)'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - script: |
      set -e
      cd "$(Build.SourcesDirectory)/$(projectDir)"
      echo "PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_BROWSERS_PATH"
      node -v
      npm -v
      npx playwright --version
      echo "Listando .pw-browsers:"
      ls -la "$(Build.SourcesDirectory)/.pw-browsers" || true
    displayName: 'Sanity check (versoes, browsers e estrutura)'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - script: |
      set -e
      cd "$(Build.SourcesDirectory)/$(projectDir)"
      npx playwright test --reporter=list,html --output=test-results
    displayName: 'Executar testes UI + API Token'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  # (NOVO) Inspecionar SEMPRE o diretório de resultados JUnit
  - script: |
      set -e
      echo "Listando $(resultsDir):"
      ls -la "$(resultsDir)" || true
      echo "Procurando XML no workspace (3 niveis):"
      find "$(Build.SourcesDirectory)" -maxdepth 3 -name "*.xml" -print || true
    displayName: 'Inspecionar arquivos JUnit'

  # Fallback do HTML quando os testes falham (evita erro de PathToPublish)
  - script: |
      mkdir -p "$(reportDir)"
      echo "<html><body><h3>Relatorio nao gerado porque os testes falharam.</h3></body></html>" > "$(reportDir)/index.html"
    displayName: 'Garantir pasta do relatorio (fallback)'
    condition: failed()

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(resultsDir)/*.xml'
      searchFolder: '$(Build.SourcesDirectory)'
      failTaskOnFailedTests: true
      testRunTitle: 'Projeto 6 — UI+API Token (Playwright)'
    condition: succeededOrFailed()
    displayName: 'Publicar Test Results (JUnit)'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(reportDir)'
      ArtifactName: 'playwright-report-ui-token'
      publishLocation: 'Container'
    condition: always()
    displayName: 'Publicar relatorio HTML (Playwright)'