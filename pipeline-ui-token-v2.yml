# Projeto 6 - UI + API Token (Playwright) - v2 limpa

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - ui-api-token/**
      - pipeline-ui-token-v2.yml

pool:
  vmImage: 'windows-latest'

variables:
  projectDir: 'ui-api-token'
  reportDir: '$(Build.SourcesDirectory)/ui-api-token/playwright-report'
  resultsDir: '$(Build.SourcesDirectory)/ui-api-token/test-results'
  PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Instalar Node.js 20'

  - script: |
      cd $(Build.SourcesDirectory)/$(projectDir)
      echo Instalar dependencias npm...
      npm ci || npm install
      echo Baixar Playwright Chromium no workspace...
      npx playwright install --with-deps chromium
      echo Conferindo pasta de browsers apos o download...
      dir "$(Build.SourcesDirectory)\.pw-browsers"
    displayName: 'Instalar dependencias + Chromium (Playwright)'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - script: |
      cd $(Build.SourcesDirectory)/$(projectDir)
      echo PLAYWRIGHT_BROWSERS_PATH=%PLAYWRIGHT_BROWSERS_PATH%
      node -v
      npm -v
      npx playwright --version
      echo Listando browsers (cmd)...
      dir "$(Build.SourcesDirectory)\.pw-browsers"
      echo Listando browsers (PowerShell)...
      powershell -NoProfile -Command "Get-ChildItem -Recurse '$(Build.SourcesDirectory)\.pw-browsers' | Select-Object -First 20 | Format-List; exit $LASTEXITCODE"
    displayName: 'Sanity check (versoes, browsers e estrutura)'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - script: |
      cd $(Build.SourcesDirectory)/$(projectDir)
      echo Executar testes (HTML + JUnit via config)...
      npx playwright test --reporter=list,html --output=test-results
    displayName: 'Executar testes UI + API Token'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - powershell: |
      $p = "$(reportDir)"
      if (!(Test-Path $p)) {
        New-Item -ItemType Directory -Force -Path $p | Out-Null
        '<html><body><h3>Relatorio nao gerado porque os testes falharam.</h3></body></html>' | Out-File "$p\index.html" -Encoding UTF8
      }
    displayName: 'Garantir pasta do relatorio (fallback)'
    condition: failed()

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(resultsDir)/junit.xml'
      failTaskOnFailedTests: true
    condition: succeededOrFailed()
    displayName: 'Publicar Test Results (JUnit)'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(reportDir)'
      ArtifactName: 'playwright-report-ui-token'
      publishLocation: 'Container'
    condition: always()
    displayName: 'Publicar relatorio HTML (Playwright)'