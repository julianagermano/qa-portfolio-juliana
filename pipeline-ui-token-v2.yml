# Projeto 6 - UI + API Token (Playwright) - v2 limpa

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - ui-api-token/**
      - pipeline-ui-token-v2.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  projectDir: 'ui-api-token'
  reportDir: '$(Build.SourcesDirectory)/ui-api-token/playwright-report'
  resultsDir: '$(Build.SourcesDirectory)/ui-api-token/test-results'
  PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Instalar Node.js 20'

  - script: |
      set -e
      cd "$(Build.SourcesDirectory)/$(projectDir)"
      echo "npm ci || npm install"
      npm ci || npm install
      echo "Baixar Chromium no workspace (com deps) ..."
      npx playwright install --with-deps chromium
      echo "Conteudo de .pw-browsers apos o download:"
      ls -la "$(Build.SourcesDirectory)/.pw-browsers" || true
    displayName: 'Instalar dependencias + Chromium (Playwright)'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - script: |
      set -e
      cd "$(Build.SourcesDirectory)/$(projectDir)"
      echo "PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_BROWSERS_PATH"
      node -v
      npm -v
      npx playwright --version
      echo "Listando .pw-browsers:"
      ls -la "$(Build.SourcesDirectory)/.pw-browsers" || true
    displayName: 'Sanity check (versoes, browsers e estrutura)'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - script: |
      set -e
      cd "$(Build.SourcesDirectory)/$(projectDir)"
      npx playwright test --reporter=list,html --output=test-results
    displayName: 'Executar testes UI + API Token'
    env:
      PLAYWRIGHT_BROWSERS_PATH: '$(Build.SourcesDirectory)/.pw-browsers'

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(resultsDir)/junit.xml'
      failTaskOnFailedTests: true
    condition: succeededOrFailed()
    displayName: 'Publicar Test Results (JUnit)'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(reportDir)'
      ArtifactName: 'playwright-report-ui-token'
      publishLocation: 'Container'
    condition: always()
    displayName: 'Publicar relatorio HTML (Playwright)'