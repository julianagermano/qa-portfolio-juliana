trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  projectdir: 'ui-api-token'
  NODE_VERSION: '20.x'
  NPM_CACHE_FOLDER: $(Pipeline.Workspace)/.npm
  PLAYWRIGHT_BROWSERS_PATH: $(Pipeline.Workspace)/.pw-browsers
  runE2E: 'false'
  hasJUnit: 'false'

steps:
- checkout: self

# Diagnóstico: garante pasta do projeto
- powershell: |
    Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    Write-Host "Conteúdo da raiz do repo:"
    Get-ChildItem "$(Build.SourcesDirectory)" -Force

    $proj = "$(Build.SourcesDirectory)\$(projectdir)"
    Write-Host "Projeto esperado em: $proj"

    if (!(Test-Path $proj)) {
      Write-Error "❌ Pasta do projeto não encontrada: $proj"
      exit 1
    }

    Set-Location $proj
    Write-Host "✅ Pasta atual:"
    pwd
    Get-ChildItem -Force
  displayName: 'PASSO B - Entrar na pasta do projeto'

# Cache npm
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(NPM_CACHE_FOLDER)'
  displayName: 'Cache do npm'

# Instalar dependências
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    npm config set cache "$(NPM_CACHE_FOLDER)" --global
    npm ci
  displayName: 'PASSO C - Instalar dependências (npm ci)'

# Health Check (define se roda E2E)
- powershell: |
    Write-Host "BASE_URL=$env:BASE_URL"

    $ok = $true
    try {
      $uri = [Uri]$env:BASE_URL
      $hostName = $uri.Host
      Write-Host "Host detectado: $hostName"

      [System.Net.Dns]::GetHostEntry($hostName) | Out-Null
      Write-Host "✅ DNS OK"
    } catch {
      $ok = $false
      Write-Host "⚠️ DNS falhou: $($_.Exception.Message)"
    }

    if ($ok) {
      Write-Host "##vso[task.setvariable variable=runE2E]true"
      Write-Host "✅ Ambiente parece OK. Vou rodar E2E."
    } else {
      Write-Host "##vso[task.setvariable variable=runE2E]false"
      Write-Host "⚠️ Ambiente fora/URL inválida. Vou pular E2E."
    }
  displayName: "Health Check (define se roda E2E)"
  env:
    BASE_URL: $(BASE_URL)

# Cache Playwright browsers (condicional corretamente)
- task: Cache@2
  condition: eq(variables.runE2E, 'true')
  inputs:
    key: 'playwright | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      playwright | "$(Agent.OS)"
    path: '$(PLAYWRIGHT_BROWSERS_PATH)'
  displayName: 'Cache Playwright browsers'

# Garantir pastas de evidências (evita "Path does not exist")
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    New-Item -ItemType Directory -Force "test-results" | Out-Null
    New-Item -ItemType Directory -Force "playwright-report" | Out-Null
  displayName: 'Criar pastas de evidência'
  condition: eq(variables.runE2E, 'true')

# Instalar browsers Playwright
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    $env:PLAYWRIGHT_BROWSERS_PATH = "$(PLAYWRIGHT_BROWSERS_PATH)"
    npx playwright install
  displayName: 'Instalar browsers do Playwright'
  condition: eq(variables.runE2E, 'true')
  env:
    PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

# Executar testes (uma vez só) — reporters já definidos no playwright.config.js
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    npx playwright test
  displayName: "PASSO D - Executar testes Playwright"
  condition: eq(variables.runE2E, 'true')
  env:
    BASE_URL: $(BASE_URL)
    API_TOKEN: $(API_TOKEN)
  continueOnError: true

# Checar se junit.xml existe (evita warning)
- powershell: |
    $junit = "$(Build.SourcesDirectory)\$(projectdir)\test-results\junit.xml"
    if (Test-Path $junit) {
      Write-Host "##vso[task.setvariable variable=hasJUnit]true"
      Write-Host "✅ junit.xml encontrado: $junit"
    } else {
      Write-Host "##vso[task.setvariable variable=hasJUnit]false"
      Write-Host "⚠️ junit.xml não encontrado"
    }
  displayName: "Checar JUnit (Playwright)"
  condition: succeededOrFailed()

# Publicar Test Results (JUnit) na aba Tests do Azure DevOps (somente se existir)
- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables.hasJUnit, 'true'))
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/$(projectdir)/test-results'
    failTaskOnFailedTests: false
  displayName: 'Publicar Test Results (JUnit - Playwright)'

# Publicar JUnit na aba Tests (somente se existir)
- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables.hasJUnit, 'true'))
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/$(projectdir)/test-results'
    failTaskOnFailedTests: false
  displayName: "Publicar Test Results (JUnit - Playwright)"

# Publicar evidências (test-results)
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/test-results'
    artifact: 'test-results'
    publishLocation: 'pipeline'
  displayName: 'Publicar test-results'

# Publicar relatório HTML (playwright-report)
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/playwright-report'
    artifact: 'playwright-report'
    publishLocation: 'pipeline'
  displayName: 'Publicar playwright-report'