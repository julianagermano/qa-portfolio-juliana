trigger:
- main

pool:
  vmImage: 'windows-latest'


variables:
  projectdir: 'ui-api-token'
  projectPath: 'qa-portfolio-juliana/ui-api-token'
  NODE_VERSION: '20.x'
  NPM_CACHE_FOLDER: '$(Pipeline.Workspace)/.npm'
  PLAYWRIGHT_BROWSERS_PATH: '$(Pipeline.Workspace)/.pw-browsers'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Usar Node.js $(NODE_VERSION)'

# 1) Diagnóstico (evita rodar fora da pasta)
- powershell: |
    Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    Write-Host "Conteúdo da raiz do repo:"
    Get-ChildItem "$(Build.SourcesDirectory)" -Force

    $proj = "$(Build.SourcesDirectory)/$(projectdir)"
    Write-Host "Tentando entrar em: $proj"

    if (!(Test-Path $proj)) {
      Write-Error "❌ Pasta do projeto não encontrada: $proj"
      exit 1
    }

    Set-Location $proj
    Write-Host "✅ Pasta atual:"
    pwd
    Get-ChildItem -Force
  displayName: "PASSO B - Entrar na pasta do projeto"

# 2) Cache do NPM (APONTANDO PARA O package-lock.json DA SUBPASTA)
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(NPM_CACHE_FOLDER)'
  displayName: 'Cache do npm'

# Instalar dependências
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/ui-api-token"
    npm ci
  displayName: "PASSO C - Instalar dependências"

# Instalar browsers do Playwright (fix padrão)
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/ui-api-token"
    npx playwright install
  displayName: "PASSO D0 - Instalar browsers do Playwright"

# Rodar testes (didático)
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/ui-api-token"
    npx playwright test --reporter=list,html,junit
  displayName: "PASSO D - Executar testes Playwright"
  continueOnError: true

# Checar relatórios
- powershell: |
    $report = "$(Build.SourcesDirectory)/ui-api-token/playwright-report"
    $junit  = "$(Build.SourcesDirectory)/ui-api-token/test-results/junit.xml"
    if (Test-Path $report) { Write-Host "##vso[task.setvariable variable=hasReport]true" } else { Write-Host "##vso[task.setvariable variable=hasReport]false" }
    if (Test-Path $junit)  { Write-Host "##vso[task.setvariable variable=hasJUnit]true" }  else { Write-Host "##vso[task.setvariable variable=hasJUnit]false" }
  displayName: "Checar se existem relatórios"
  condition: succeededOrFailed()

# Publicar JUnit
- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables.hasJUnit, 'true'))
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/ui-api-token'
    failTaskOnFailedTests: false
  displayName: "Publicar JUnit"

# Publicar HTML report
- task: PublishPipelineArtifact@1
  condition: and(succeededOrFailed(), eq(variables.hasReport, 'true'))
  inputs:
    targetPath: '$(Build.SourcesDirectory)/ui-api-token/playwright-report'
    artifact: 'playwright-report'
  displayName: "Publicar Playwright report"