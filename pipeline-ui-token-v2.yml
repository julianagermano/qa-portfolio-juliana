trigger:
- main

pool:
  vmImage: 'windows-latest'


variables:
  projectdir: 'ui-api-token'
  projectPath: 'qa-portfolio-juliana/ui-api-token'
  NODE_VERSION: '20.x'
  NPM_CACHE_FOLDER: '$(Pipeline.Workspace)/.npm'
  PLAYWRIGHT_BROWSERS_PATH: '$(Pipeline.Workspace)/.pw-browsers'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Usar Node.js $(NODE_VERSION)'

# 1) Diagnóstico (evita rodar fora da pasta)
- powershell: |
    Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    Write-Host "Conteúdo da raiz do repo:"
    Get-ChildItem "$(Build.SourcesDirectory)" -Force

    $proj = "$(Build.SourcesDirectory)/$(projectdir)"
    Write-Host "Tentando entrar em: $proj"

    if (!(Test-Path $proj)) {
      Write-Error "❌ Pasta do projeto não encontrada: $proj"
      exit 1
    }

    Set-Location $proj
    Write-Host "✅ Pasta atual:"
    pwd
    Get-ChildItem -Force
  displayName: "PASSO B - Entrar na pasta do projeto"

# 2) Cache do NPM (APONTANDO PARA O package-lock.json DA SUBPASTA)
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(NPM_CACHE_FOLDER)'
  displayName: 'Cache do npm'

# Instalar dependências
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/ui-api-token"
    npm ci
  displayName: "PASSO C - Instalar dependências"

- powershell: |
    $tr = "$(Build.SourcesDirectory)/$(projectdir)/test-results"
    $pr = "$(Build.SourcesDirectory)/$(projectdir)/playwright-report"

    if (Test-Path $tr) { Write-Host "##vso[task.setvariable variable=hasTR]true" } else { Write-Host "##vso[task.setvariable variable=hasTR]false" }
    if (Test-Path $pr) { Write-Host "##vso[task.setvariable variable=hasPR]true" } else { Write-Host "##vso[task.setvariable variable=hasPR]false" }
  displayName: "Checar pastas de evidência"
  condition: succeededOrFailed()

- powershell: |
    Set-Location "$(Build.SourcesDirectory)/ui-api-token"

    New-Item -ItemType Directory -Force "test-results" | Out-Null
    New-Item -ItemType Directory -Force "playwright-report" | Out-Null

    Write-Host "✅ Pastas criadas/garantidas:"
    Write-Host " - $(Build.SourcesDirectory)/ui-api-token/test-results"
    Write-Host " - $(Build.SourcesDirectory)/ui-api-token/playwright-report"
  displayName: "Criar pastas de evidência (test-results e playwright-report)"

- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"

    # garante pastas de evidência
    New-Item -ItemType Directory -Force "test-results" | Out-Null
    New-Item -ItemType Directory -Force "playwright-report" | Out-Null

    npm ci
    npx playwright install

    # Exemplo: checar se token veio (não printa o token)
    if (-not $env:API_TOKEN) { throw "API_TOKEN não foi injetado no ambiente." }

    npx playwright test --reporter=list,html,junit
  displayName: "PASSO D - Executar testes Playwright"
  env:
    API_TOKEN: $(API_TOKEN)
  continueOnError: true

# Rodar testes (didático)
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/ui-api-token"
    npx playwright test --reporter=list,html,junit
  displayName: "PASSO D - Executar testes Playwright"
  continueOnError: true

# Checar relatórios
- powershell: |
    $report = "$(Build.SourcesDirectory)/ui-api-token/playwright-report"
    $junit  = "$(Build.SourcesDirectory)/ui-api-token/test-results/junit.xml"
    if (Test-Path $report) { Write-Host "##vso[task.setvariable variable=hasReport]true" } else { Write-Host "##vso[task.setvariable variable=hasReport]false" }
    if (Test-Path $junit)  { Write-Host "##vso[task.setvariable variable=hasJUnit]true" }  else { Write-Host "##vso[task.setvariable variable=hasJUnit]false" }
  displayName: "Checar se existem relatórios"
  condition: succeededOrFailed()

# Publicar JUnit
- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables.hasJUnit, 'true'))
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/ui-api-token'
    failTaskOnFailedTests: false
  displayName: "Publicar JUnit"

# Publicar HTML report
- task: PublishPipelineArtifact@1
  condition: and(succeededOrFailed(), eq(variables.hasTR, 'true'))
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/test-results'
    artifact: 'test-results'
  displayName: "Publicar evidências (test-results)"
- task: PublishPipelineArtifact@1
  condition: and(succeededOrFailed(), eq(variables.hasPR, 'true'))
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/playwright-report'
    artifact: 'playwright-report'
  displayName: "Publicar relatório (playwright-report)"
