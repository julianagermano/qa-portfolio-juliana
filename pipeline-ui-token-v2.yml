trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  PLAYWRIGHT_BROWSERS_PATH: '$(Pipeline.Workspace)/.pw-browsers'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Usar Node.js $(NODE_VERSION)'

# Cache do npm (acelera npm ci)
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(Pipeline.Workspace)/.npm'
  displayName: 'Cache do npm'

- script: |
    npm config set cache $(Pipeline.Workspace)/.npm --global
    npm ci
  displayName: 'Instalar dependências (npm ci)'

# Cache dos browsers do Playwright
- task: Cache@2
  inputs:
    key: 'playwright | "$(Agent.OS)" | package-lock.json'
    restoreKeys: |
      playwright | "$(Agent.OS)"
    path: '$(PLAYWRIGHT_BROWSERS_PATH)'
  displayName: 'Cache Playwright browsers'

- script: |
    npx playwright install --with-deps
  displayName: 'Instalar browsers do Playwright'
  env:
    PLAYWRIGHT_BROWSERS_PATH: '$(PLAYWRIGHT_BROWSERS_PATH)'

- script: |
    npx playwright test --reporter=list,html,junit
  displayName: 'Executar testes'
  env:
    PLAYWRIGHT_BROWSERS_PATH: '$(PLAYWRIGHT_BROWSERS_PATH)'

- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/junit.xml'
    failTaskOnFailedTests: false
  displayName: 'Publicar JUnit'

- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: 'playwright-report'
    artifact: 'playwright-report'
  displayName: 'Publicar relatório HTML'