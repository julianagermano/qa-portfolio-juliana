trigger:
- main

pool:
  vmImage: 'windows-latest'


variables:
  projectdir: 'ui-api-token'
  projectPath: 'qa-portfolio-juliana/ui-api-token'
  NODE_VERSION: '20.x'
  NPM_CACHE_FOLDER: '$(Pipeline.Workspace)/.npm'
  PLAYWRIGHT_BROWSERS_PATH: '$(Pipeline.Workspace)/.pw-browsers'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Usar Node.js $(NODE_VERSION)'

# 1) Diagnóstico (evita rodar fora da pasta)
- powershell: |
    Write-Host "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    Write-Host "Conteúdo da raiz do repo:"
    Get-ChildItem "$(Build.SourcesDirectory)" -Force

    $proj = "$(Build.SourcesDirectory)/$(projectdir)"
    Write-Host "Tentando entrar em: $proj"

    if (!(Test-Path $proj)) {
      Write-Error "❌ Pasta do projeto não encontrada: $proj"
      exit 1
    }

    Set-Location $proj
    Write-Host "✅ Pasta atual:"
    pwd
    Get-ChildItem -Force
  displayName: "PASSO B - Entrar na pasta do projeto"

# 2) Cache do NPM (APONTANDO PARA O package-lock.json DA SUBPASTA)
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(NPM_CACHE_FOLDER)'
  displayName: 'Cache do npm'

# 3) Instalar dependências
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    npm ci
  displayName: "PASSO C - Instalar dependências"


# 4) Cache dos browsers do Playwright
- task: Cache@2
  inputs:
    key: 'playwright | "$(Agent.OS)" | $(Build.SourcesDirectory)/$(projectdir)/package-lock.json'
    restoreKeys: |
      playwright | "$(Agent.OS)"
    path: '$(PLAYWRIGHT_BROWSERS_PATH)'
  displayName: 'Cache Playwright browsers'

# 5) Instalar browsers do Playwright (com deps)
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    $env:PLAYWRIGHT_BROWSERS_PATH = "$(PLAYWRIGHT_BROWSERS_PATH)"
    npx playwright install
  displayName: 'Instalar browsers do Playwright'

# 6) Executar testes + gerar JUnit
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    $env:PLAYWRIGHT_BROWSERS_PATH = "$(PLAYWRIGHT_BROWSERS_PATH)"

    # Gera JUnit + HTML report
    npx playwright test --reporter=list,html,junit
  displayName: 'Executar testes Playwright'

# 7) Publicar resultados JUnit (mesmo se falhar)
- powershell: |
    Set-Location "$(Build.SourcesDirectory)/$(projectdir)"
    npx playwright test
  displayName: "PASSO D - Executar testes"
  condition: succeededOrFailed()
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/junit.xml'
    searchFolder: '$(Build.SourcesDirectory)/$(projectdir)'
    failTaskOnFailedTests: false
  displayName: "PASSO E - Publicar JUnit"

# 8) Publicar relatório HTML do Playwright (mesmo se falhar)
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/playwright-report'
    artifact: 'playwright-report'
  displayName: "PASSO F - Publicar Playwright report"

# 9) Publicar evidências (screenshots) se existirem
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/screenshots'
    artifact: 'screenshots'
  displayName: "PASSO G - Publicar screenshots"

- powershell: |
    $report = "$(Build.SourcesDirectory)/$(projectdir)/playwright-report"
    if (Test-Path $report) {
      Write-Host "##vso[task.setvariable variable=hasReport]true"
    } else {
      Write-Host "##vso[task.setvariable variable=hasReport]false"
    }
  displayName: "Checar se existe playwright-report"
  condition: succeededOrFailed()

- task: PublishPipelineArtifact@1
  condition: and(succeededOrFailed(), eq(variables.hasReport, 'true'))
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/playwright-report'
    artifact: 'playwright-report'
  displayName: "Publicar Playwright report"
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(projectdir)/playwright-report'
    artifact: 'playwright-report'
    publishLocation: 'pipeline'
